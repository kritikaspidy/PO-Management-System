<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Management</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div>
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">PO</div>
          <div>
            <div class="sidebar-brand-title">PO System</div>
            <div class="sidebar-brand-subtitle">ERP Module</div>
          </div>
        </div>

        <nav class="sidebar-nav">
          <a href="index.html" class="sidebar-link">Dashboard</a>
          <a href="vendors.html" class="sidebar-link active">Vendors</a>
          <a href="products.html" class="sidebar-link">Products</a>
          <a href="create-po.html" class="sidebar-link">Create PO</a>
        </nav>
      </div>

      <div class="sidebar-footer">
        <button type="button" class="sidebar-link sidebar-logout-btn" onclick="logout()">
          Logout
        </button>
      </div>
    </aside>

    <div class="main-content">
      <nav class="topbar">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
          <div>
            <div class="brand-title">PO Management System</div>
            <div class="brand-subtitle">Vendor Management</div>
          </div>

          <div class="d-flex align-items-center gap-3">
            <span id="userEmail" class="text-white small fw-semibold"></span>
          </div>
        </div>
      </nav>

      <main class="container-fluid px-4 py-4">
        <div id="vendorAlertBox" class="mb-3"></div>

        <div class="row g-4">
          <div class="col-lg-4">
            <section class="panel p-4">
              <div class="panel-header px-0 pt-0">
                <h2 class="panel-title mb-1">Add Vendor</h2>
                <p class="panel-subtitle mb-0">Create a new vendor record.</p>
              </div>

              <form id="vendorForm">
                <div class="mb-3">
                  <label class="form-label custom-label">Vendor Name</label>
                  <input type="text" id="vendorName" class="form-control modern-input" required />
                </div>

                <div class="mb-3">
                  <label class="form-label custom-label">Contact</label>
                  <input type="text" id="vendorContact" class="form-control modern-input" required />
                </div>

                <div class="mb-3">
                  <label class="form-label custom-label">Rating</label>
                  <input type="number" id="vendorRating" class="form-control modern-input" min="0" max="5" step="0.1" required />
                </div>

                <button type="submit" class="btn btn-primary btn-modern w-100">Add Vendor</button>
              </form>
            </section>
          </div>

          <div class="col-lg-8">
            <section class="panel">
              <div class="panel-header">
                <h2 class="panel-title mb-1">All Vendors</h2>
                <p class="panel-subtitle mb-0">View all vendors available in the system.</p>
              </div>

              <div class="table-responsive">
                <table class="table modern-table align-middle mb-0">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Name</th>
                      <th>Contact</th>
                      <th>Rating</th>
                    </tr>
                  </thead>
                  <tbody id="vendorTableBody">
                    <tr>
                      <td colspan="4" class="text-center py-4 muted-text">Loading vendors...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/vendors.js"></script>
</body>
</html>
